{ % raw %}
<div id="main-wrapper" class="main-wrapper">
  <div class="sticky-section left-sticky-section" id="tool-section">
    <div class="sticky-section-wrap">
      <div class="vertical-centerer">
        <div
          class="pen-size-container size-picker-container"
          title="Размер пера<br/>от 1 до 4 пикселей"
          rel="tooltip"
          data-placement="top"
          data-test-id="pen-size-picker"
        >
          <div
            class="pen-size-option size-picker-option"
            data-size="1"
            data-test-id="pen-size-1"
          ></div>
          <div
            class="pen-size-option size-picker-option"
            data-size="2"
            data-test-id="pen-size-2"
          ></div>
          <div
            class="pen-size-option size-picker-option"
            data-size="3"
            data-test-id="pen-size-3"
          ></div>
          <div
            class="pen-size-option size-picker-option"
            data-size="4"
            data-test-id="pen-size-4"
          ></div>
        </div>
        <ul
          id="tools-container"
          class="tools-wrapper"
          data-test-id="tools-container"
        ><!-- Инструменты рисования будут вставлены сюда --></ul>
        <div class="palette-wrapper">
          <div
            class="tool-icon tool-color-picker"
            data-initial-title="Primary - left mouse button"
            rel="tooltip"
            data-placement="right"
          >
            <input
              id="color-picker"
              class="color"
              type="text"
              data-test-id="primary-color-picker"
            >
          </div>
          <div
            class="tool-icon tool-color-picker"
            data-initial-title="Secondary - right mouse button"
            rel="tooltip"
            data-placement="right"
          >
            <input
              id="secondary-color-picker"
              class="secondary-color-picker color"
              type="text"
              data-test-id="secondary-color-picker"
            >
          </div>
          <div
            class="swap-colors-button icon-common-swapcolors-arrow-grey"
            data-test-id="swap-colors-button"
            title="Поменять цвета (X)"
            rel="tooltip"
            data-placement="right"
          ></div>
        </div>
      </div>
    </div>

    <!-- Templates -->

    <!-- Drawing tool icon-button -->
    <script type="text/template" id="drawingTool-item-template">
  <li rel="tooltip" data-placement="{{tooltipposition}}" class="{{cssclass}}" data-tool-id="{{toolid}}" data-test-id="tool-{{toolid}}" title="{{title}}"></li>
</script>
  </div>

  <div id="column-wrapper" class="column-wrapper">
    <div class="column left-column">
      <div
        id="preview-list-wrapper"
        class="preview-list-wrapper"
        data-test-id="frame-list"
      >
        <div id="preview-list-scroller" class="preview-list-scroller">
          <ul class="preview-list" id="preview-list"></ul>
        </div>
        <div class="top-overflow"></div>
        <div class="bottom-overflow"></div>
      </div>
    </div>

    <div class="column main-column">
      <div
        id="drawing-canvas-container"
        class="drawing-canvas-container canvas-container"
        data-test-id="drawing-canvas"
      >
        <div
          rel="tooltip"
          data-placement="left"
          class="piskel-icon-onion preview-toggle-onion-skin"
          data-test-id="onion-skin-toggle-button"
        ></div>
        <div class="canvas-background"></div>
      </div>
    </div>

    <div class="column right-column">
      <div id="animated-preview-container" class="preview-container">
        <div class="canvas-container-wrapper minimap-container">
          <div class="preview-contextual-actions">
            <div class="preview-drop-down">
              <div
                class="preview-disable-overlay"
                rel="tooltip"
                data-placement="left"
              ></div>
              <div
                class="preview-contextual-action  original-size-button"
                rel="tooltip"
                data-placement="left"
                data-test-id="preview-size-1x"
              >
                1x
              </div>
              <div
                class="preview-contextual-action  best-size-button"
                rel="tooltip"
                data-placement="left"
                data-test-id="preview-size-best"
              ></div>
              <div
                class="preview-contextual-action  full-size-button"
                rel="tooltip"
                data-placement="left"
                data-test-id="preview-size-full"
              >
                Полный
              </div>
            </div>
            <div
              class="preview-contextual-action  toggle-grid-button  icon-minimap-grid-white"
              title="Переключить сетку"
              rel="tooltip"
              data-placement="bottom"
              data-test-id="grid-toggle-button"
            ></div>
            <div
              class="preview-contextual-action  open-popup-preview-button  icon-minimap-popup-preview-arrow-white"
              title="Открыть предпросмотр во всплывающем окне"
              rel="tooltip"
              data-placement="bottom"
              data-test-id="open-popup-preview-button"
            ></div>
          </div>

          <div id="animated-preview-canvas-container" class="canvas-container">
            <div class="canvas-background"></div>
          </div>
        </div>
        <div>
          <span
            id="display-fps"
            class="display-fps"
            data-test-id="fps-display"
          ></span>
          <input
            id="preview-fps"
            class="range-fps"
            type="range"
            min="0"
            max="24"
            data-test-id="fps-slider"
          >
        </div>
        <div></div>
      </div>

      <div
        class="toolbox-container layers-list-container"
        data-test-id="layer-list"
      >
        <h3 class="toolbox-title layers-title">
          Слои
          <div
            rel="tooltip"
            data-placement="left"
            class="layers-toggle-preview piskel-icon-eye"
            data-test-id="layer-preview-toggle"
          ></div>
        </h3>
        <div class="toolbox-buttons">
          <button
            data-action="add"
            data-test-id="layer-add-button"
            class="button layers-button piskel-icon-plus"
            rel="tooltip"
            data-placement="top"
          ></button>

          <button
            data-action="up"
            data-test-id="layer-move-up-button"
            class="button layers-button piskel-icon-arrow-up-fat"
            title="Переместить слой выше"
            rel="tooltip"
            data-placement="top"
          ></button>

          <button
            data-action="down"
            data-test-id="layer-move-down-button"
            class="button layers-button piskel-icon-arrow-down-fat"
            title="Переместить слой ниже"
            rel="tooltip"
            data-placement="top"
          ></button>

          <button
            data-action="edit"
            data-test-id="layer-edit-button"
            class="button layers-button piskel-icon-pencil"
            title="Изменить имя слоя"
            rel="tooltip"
            data-placement="top"
          ></button>

          <button
            data-action="merge"
            data-test-id="layer-merge-button"
            class="button layers-button piskel-icon-merge"
            title="Объединить со слоем ниже"
            rel="tooltip"
            data-placement="top"
          ></button>

          <button
            data-action="delete"
            data-test-id="layer-delete-button"
            class="button layers-button piskel-icon-close"
            title="Удалить выбранный слой"
            rel="tooltip"
            data-placement="top"
          ></button>
        </div>

        <ul class="layers-list" data-test-id="layers-list-items"></ul>

        <script type="text/template" id="layer-item-template">
  <li class="layer-item {{isselected:current-layer-item}}"
      data-layer-index="{{layerindex}}" data-test-id="layer-item">
      <span class="layer-name" data-placement="top" data-test-id="layer-name">{{layername}}</span>
      <span class="layer-item-opacity" data-test-id="layer-opacity"
            title="Прозрачность слоя ({{opacity}})" rel="tooltip" data-placement="top">
          &#945;
      </span>
  </li>
</script>

        <script type="text/template" id="layer-name-input-template">
  <input class="textfield layer-name-input" type="text" autocomplete="off" value="{{layername}}" data-test-id="layer-name-input" />
</script>
      </div>

      <div class="toolbox-container transformations-container">
        <h3 class="toolbox-title transformations-title">
          Преобразование
          <span
            class="transformations-show-more-link piskel-icon-plus"
            title="Показать больше инструментов"
            rel="tooltip"
            data-placement="top"
          ></span>
        </h3>
        <ul class="tools-wrapper"></ul>
      </div>

      <div class="toolbox-container palettes-list-container">
        <h3 class="toolbox-title palettes-title">Палитры</h3>
        <div class="toolbox-buttons">
          <button
            class="button palettes-list-button create-palette-button piskel-icon-plus"
            data-action="add"
            title="Создать новую палитру"
            rel="tooltip"
            data-placement="top"
            data-test-id="create-palette-button"
          ></button>
          <select
            class="button palettes-list-select"
            data-test-id="palette-select"
          ></select>
          <button
            class="button palettes-list-button edit-palette-button  piskel-icon-pencil"
            data-action="edit"
            title="Управлять этой палитрой"
            rel="tooltip"
            data-placement="top"
          ></button>
        </div>
        <div class="palettes-list-colors"></div>
        <button
          type="button"
          class="button save-current-frame-button"
          data-test-id="save-current-frame-button"
        >Сохранить лист</button>
        <script type="text/template" id="palette-color-template">
  <div class="palettes-list-color"
       data-color="{{color}}"
       data-color-index="{{index}}"
       title="{{title}}">
    <div data-color="{{color}}" style="background:{{color}}"></div>
  </div>
</script>

        <script type="text/template" id="palettes-list-no-colors-partial">
  <div class="palettes-list-no-colors">
    В этой палитре нет цветов…
  </div>
</script>
      </div>

      <div class="pull-bottom cursor-coordinates"></div>
    </div>
  </div>

  <div
    id="application-action-section"
    data-pskl-controller="settings"
    class="sticky-section right-sticky-section"
  >
    <div class="sticky-section-wrap">
      <div class="vertical-centerer">
        <div
          data-setting="user"
          class="tool-icon icon-settings-gear-white"
          title="<span class='highlight'>НАСТРОЙКИ</span></br>"
          rel="tooltip"
          data-placement="left"
        ></div>

        <div
          data-setting="resize"
          class="tool-icon  icon-settings-resize-white"
          title="<span class='highlight'>РАЗМЕР</span></br>Изменить размер области рисования"
          rel="tooltip"
          data-placement="left"
        ></div>

        <div
          data-setting="save"
          class="tool-icon  icon-settings-save-white"
          title="<span class='highlight'>СОХРАНИТЬ</span></br>Сохранить локально или экспортировать как файл"
          rel="tooltip"
          data-placement="left"
        ></div>

        <div
          data-setting="export"
          class="tool-icon  icon-settings-export-white"
          title="<span class='highlight'>ЭКСПОРТ</span></br>Экспортировать как изображение, спрайт-лист<br/>или анимированный GIF"
          rel="tooltip"
          data-placement="left"
        ></div>

        <div
          data-setting="import"
          class="tool-icon  icon-settings-open-folder-white"
          title="<span class='highlight'>ИМПОРТ</span></br>Импортировать существующее изображение,<br/>анимированный GIF или файл .piskel"
          rel="tooltip"
          data-placement="left"
        ></div>
      </div>

      <div class="drawer vertical-centerer">
        <div class="drawer-content" id="drawer-container"></div>
      </div>
    </div>
  </div>
</div>

<div id="dialog-container-wrapper">
  <div id="dialog-container"></div>
</div>

<div style="display:none">
  <script type="text/template" id="progress-bar-template">
  <div class="progress-bar-container">
    <div class="progress-bar-name">{{name}}</div>
    <div class="progress-bar-item progress-bar"></div>
    <div class="progress-bar-item progress-bar-status">{{status}}%</div>
  </div>
</script>

  <!-- Tooltip container -->
  <script type="text/template" id="tooltip-container-template">
  <div class='tooltip-container'>
    <div>{{helptext}} <span class='tooltip-shortcut'>{{shortcut}}</span></div>
    {{!descriptors!}}
  </div>
</script>

  <!-- Tooltip description with modifier -->
  <script type="text/template" id="tooltip-modifier-descriptor-template">
  <div class='tooltip-descriptor'>
    <span class='tooltip-descriptor-button'>{{key}}</span>
    {{description}}
  </div>
</script>

  <!-- Simple tooltip description -->
  <script type="text/template" id="tooltip-simple-descriptor-template">
  <div class='tooltip-descriptor'>
    {{description}}
  </div>
</script>
</div>

<div style="display:none">
  <script type="text/template" id="data-uri-export-partial">
  <style>
    html, body {
      margin: 0;
    }

    body {
      background: #444;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: monospace;
    }

    #image-wrapper {
      flex-grow: 1;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    img {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEXf39////8zI3BgAAAAHklEQVR4AWNghAIGCMDgjwgFCDDSw2M0PSCD0fQAACRcAgF4ciGUAAAAAElFTkSuQmCC') repeat;
    }

    #bottom-wrapper {
      width: 600px;
      height: 300px;
      margin-top: 20px;
      position: relative;
      flex-shrink: 0;
    }

    textarea {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      padding: 10px;
      border-style: none;

      background: black;
      color: gold;
      font-family: monospace;
    }

    span {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      padding: 5px;
      color: white;
      background-color: #444;
    }
  </style>
  <body>
    <div id="image-wrapper">
      <img src="{{src}}" alt="Экспортированное изображение как data URI">
    </div>
    <div id="bottom-wrapper">
      <textarea spellcheck="false" onclick="this.select()">{{src}}</textarea>
      <span>Data URI для экспортированного листа кадров</span>
    </div>
  </body>
</script>
</div>

<div style="display:none">
  <script type="text/template" id="popup-preview-partial">
  <style>
    body,
    .popup-container ,
    .preview-container,
    .background-image-frame-container {
      width : 100%;
      height : 100%;
    }

    body {
      margin: 0;
    }

    .popup-container {
      position: absolute;
      background : #333;
    }

    .preview-container {
      position: relative;
    }

    .background-image-frame-container {
      position: relative;
      background-repeat : no-repeat;
    }

    .canvas-container .canvas-background {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .light-picker-background,
    .light-canvas-background .canvas-background {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEXf39////8zI3BgAAAAHklEQVR4AWNghAIGCMDgjwgFCDDSw2M0PSCD0fQAACRcAgF4ciGUAAAAAElFTkSuQmCC') repeat;
    }

    .medium-picker-background,
    .medium-canvas-background .canvas-background {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEW6urr///82MBGFAAAAHUlEQVR4AWOAAUYoQOePEAUj3v9oYDQ9gMBoegAAJFwCAbLaTIMAAAAASUVORK5CYII=') repeat;
    }

    .lowcont-medium-picker-background,
    .lowcont-medium-canvas-background .canvas-background {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEXV1dXb29tFGkCIAAAAHklEQVR4AWNghAIGCMDgjwgFCDDSw2M0PSCD0fQAACRcAgF4ciGUAAAAAElFTkSuQmCC ') repeat;
    }

    .lowcont-dark-picker-background,
    .lowcont-dark-canvas-background .canvas-background {
      background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAMAAABEpIrGAAAABlBMVEVMTExVVVUnhsEkAAAAHUlEQVR4AWOAAUYoQOePEAUj3v9oYDQ9gMBoegAAJFwCAbLaTIMAAAAASUVORK5CYII=') repeat;
    }
  </style>
  <div class="popup-container  lowcont-dark-canvas-background ">
    <div class="preview-container  canvas-container">
      <div class="canvas-background"></div>
    </div>
  </div>
</script>
</div>

<span
  class="cheatsheet-link icon-common-keyboard-gold"
  rel="tooltip"
  data-placement="right"
  title="Горячие клавиши"
  >&nbsp;</span
>
<div
  class="performance-link icon-common-warning-red"
  rel="tooltip"
  data-placement="left"
  title="Обнаружена проблема производительности, подробнее."
>
  &nbsp;
</div>

<!-- dialogs partials -->
<script type="text/template" id="templates/dialogs/browse-backups.html">
<div class="dialog-wrapper">
  <h3 class="dialog-head">
    Просмотр резервных копий
    <span class="dialog-close">X</span>
  </h3>
  <div class="dialog-content backups-wizard-container"></div>
</div>
</script>

<script type="text/template" id="backups-select-session">
<div class="backups-step-container">
<div class="backups-step-content">
  <div class="browse-backups-disclaimer">
    <div class="backups-icon icon-common-backup-white">&nbsp;</div>
    <div class="browse-backups-disclaimer-content">
      <!-- Keep in sync with MAX_SESSIONS in BackupService.js -->
      Если вы забыли сохранить работу или Piskel аварийно завершился, попробуйте восстановить одну из автоматически созданных ниже резервных копий сеанса (до 10 сеансов).
      <br/>
      <br/>
      Резервные копии могут быть удалены без предупреждения, поэтому постарайтесь как можно скорее сохранить работу в файл.
    </div>
  </div>
  <div class="session-list">
  </div>
</div>
</div>
</script>

<script type="text/template" id="session-list-empty">
<div class="centered-message session-list-empty">Сеансы не найдены ...</div>
</script>

<script type="text/template" id="session-list-error">
<div class="centered-message session-list-error">Не удалось загрузить резервные копии сеансов, что-то пошло не так.</div>
</script>

<script type="text/template" id="session-list-item">
<div class="session-item">
<div class="session-details">
  <span class="session-details-title">{{name}} {{description}}</span>
  <span class="session-details-info">Session recorded {{date}}</span>
  <span class="session-details-info">{{count}} saved</span>
</div>
<div class="session-actions">
  <button class="button" data-session-id="{{id}}" data-action="delete">Удалить</button>
  <button class="button button-primary" data-session-id="{{id}}" data-action="view">View</button>
</div>
</div>
</script>

<script type="text/template" id="backups-session-details">
<div class="backups-step-container">
<div class="backups-step-content">
  <div class="snapshot-list"></div>
</div>
<div class="backups-step-actions">
  <button class="button back-button">back</button>
</div>
</div>
</script>

<script type="text/template" id="snapshot-list-empty">
<div class="centered-message snapshot-list-empty">Снимки не найдены ...</div>
</script>

<script type="text/template" id="snapshot-list-error">
<div class="centered-message snapshot-list-error">Не удалось загрузить снимки, что-то пошло не так.</div>
</script>

<script type="text/template" id="snapshot-list-item">
<div class="snapshot-item" data-snapshot-id={{id}}>
<div class="snapshot-preview lowcont-dark-picker-background"></div>
<div class="snapshot-details">
  <span class="snapshot-details-title">{{name}} {{description}}</span>
  <span class="snapshot-details-info">Snapshot recorded {{date}}</span>
  <span class="snapshot-details-info">{{frames}}, size {{resolution}}, {{fps}}fps</span>
</div>
<div class="snapshot-actions">
  <button class="button button-primary" data-action="load" data-snapshot-id="{{id}}">Загрузить</button>
</div>
</div>
</script>

<script type="text/template" id="templates/dialogs/browse-local.html">
<div class="dialog-wrapper">
  <h3 class="dialog-head">
    Просмотр локальных Piskel
    <span class="dialog-close">X</span>
  </h3>
  <div class="dialog-content" style="padding:10px 20px; font-size:1.5em; overflow: auto;">
    <table class="local-piskel-list">
      <thead>
        <tr class="local-piskel-list-head">
          <td class="local-piskel-name">Имя</td>
          <td class="local-piskel-save-date">Date</td>
          <td colspan=2>Действия</td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
</script>

<script type="text/template" id="local-storage-item-template">
<tr class="local-piskel-item">
  <td class="local-piskel-name">{{name}}</td>
  <td class="local-piskel-save-date">{{date}}</td>
  <td><button type="button" data-action="load" data-name="{{name}}" class="button button-primary local-piskel-load-button">Загрузить</button></td>
  <td><button type="button" data-action="delete" data-name="{{name}}" class="button local-piskel-delete-button">Удалить</button></td>
</tr>
</script>

<script type="text/template" id="templates/dialogs/cheatsheet.html">
<div id="cheatsheetContainer" class="dialog-wrapper">
  <h3 class="dialog-head">
    <span class="dialog-title">Горячие клавиши</span>
    <span class="dialog-close">X</span>
  </h3>
  <div class="cheatsheet-container dialog-content">
    <div class="cheatsheet-section">
      <h3 class="cheatsheet-title">Tool shortcuts</h3>
      <ul class="cheatsheet-tool-shortcuts"></ul>
    </div>
    <div class="cheatsheet-section">
      <h3 class="cheatsheet-title">Misc shortcuts</h3>
      <ul class="cheatsheet-misc-shortcuts"></ul>
    </div>
    <div class="cheatsheet-boxes">
      <div class="cheatsheet-section">
        <h3 class="cheatsheet-title">Сочетания выделения</h3>
        <ul class="cheatsheet-selection-shortcuts"></ul>
      </div>
      <div class="cheatsheet-section">
        <h3 class="cheatsheet-title">Color shortcuts</h3>
        <ul class="cheatsheet-color-shortcuts"></ul>
      </div>
      <div class="cheatsheet-section">
        <h3 class="cheatsheet-title">Storage shortcuts</h3>
        <ul class="cheatsheet-storage-shortcuts"></ul>
      </div>
    </div>
  </div>
  <div class="cheatsheet-actions">

    <p>Отзывы принимаются на <a href="https://github.com/piskelapp/piskel" target="_blank">https://github.com/piskelapp/piskel</a></p>
    <p>
      <div class="warning-icon icon-common-warning-red">&nbsp;</div>
      <div class="warning-icon-info">This icon will remain on the bottom-right of the application until the performance issue is fixed. You can click on it at anytime to display this information again.</div>
    </p>
  </div>
</div>
</script>

<script type="text/javascript">
(function () {
  /**
   * This file is inlined into index.html via @@include('piskel-boot.js').
   * During build, the html-include vite plugin replaces -2026-05-29-01-44 with
   * the build timestamp (e.g. '-2026-04-05-12-19').
   */
  var version = "-2026-05-29-01-44";

  if (!window.piskelReadyCallbacks) {
    window.piskelReadyCallbacks = [];
  }

  window._onPiskelReady = function () {
    var loadingMask = document.getElementById("loading-mask");
    loadingMask.style.opacity = 0;
    window.setTimeout(function () {
      loadingMask.parentNode.removeChild(loadingMask);
    }, 600);
    pskl.app.init();
    pskl._releaseVersion = "0.15.2-SNAPSHOT";

    for (var i = 0; i < window.piskelReadyCallbacks.length; i++) {
      window.piskelReadyCallbacks[i]();
    }
  };

  var prefixPath = function (path) {
    if (window.pskl && window.pskl.appEngineToken_) {
      return "../" + path;
    } else {
      return path;
    }
  };

  var loadScript = function (src, callback) {
    src = prefixPath(src);
    var script = window.document.createElement("script");
    script.setAttribute("src", src);
    script.setAttribute("onload", callback);
    window.document.body.appendChild(script);
  };

  var loadStyle = function (src) {
    src = prefixPath(src);
    var link = document.createElement("link");
    link.setAttribute("href", src);
    link.setAttribute("rel", "stylesheet");
    link.setAttribute("type", "text/css");
    document.head.appendChild(link);
  };

  loadStyle("css/piskel-style-packaged" + version + ".css");
  loadScript("js/piskel-packaged-min" + version + ".js", "_onPiskelReady()");
})();
</script>
